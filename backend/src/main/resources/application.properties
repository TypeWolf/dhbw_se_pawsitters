spring.application.name=pawsitters
spring.profiles.default=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

pawsitters.security.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500
pawsitters.admin.email=${PAWSITTERS_ADMIN_EMAIL:}
pawsitters.admin.password=${PAWSITTERS_ADMIN_PASSWORD:}
