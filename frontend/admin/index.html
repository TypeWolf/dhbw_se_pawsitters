<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawsitters Admin</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="Back to Pawsitters">
            <span class="brand-mark" aria-hidden="true">P</span>
            <span>Pawsitters Admin</span>
        </a>
        <nav aria-label="Admin navigation">
            <a href="../index.html">Customer app</a>
        </nav>
    </header>

    <main class="admin-main">
        <section class="admin-hero reveal">
            <p class="eyebrow">Protected operations</p>
            <h1>Admin</h1>
            <p>Review users, pets, and sitting requests through role-protected API endpoints.</p>
        </section>

        <section class="auth-panel admin-login reveal" id="adminLoginPanel">
            <h2>Admin login</h2>
            <form id="adminLoginForm" class="auth-form">
                <label>
                    <span>Email</span>
                    <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>
                    <span>Password</span>
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>
                <button class="button primary wide" type="submit">Login</button>
            </form>
        </section>

        <section class="dashboard admin-dashboard hidden" id="adminDashboard">
            <div class="dashboard-header reveal">
                <div>
                    <p class="eyebrow">Admin workspace</p>
                    <h2 id="adminWelcome">Overview</h2>
                    <p id="adminStatus">Role-protected operational data.</p>
                </div>
                <button class="button secondary" id="adminLogoutButton" type="button">Logout</button>
            </div>

            <div class="stats-grid reveal">
                <article class="stat">
                    <span id="adminUserCount">0</span>
                    <p>Users</p>
                </article>
                <article class="stat">
                    <span id="adminPetCount">0</span>
                    <p>Pets</p>
                </article>
                <article class="stat">
                    <span id="adminRequestCount">0</span>
                    <p>Requests</p>
                </article>
            </div>

            <section class="admin-section reveal">
                <div class="section-heading">
                    <h3>Users</h3>
                </div>
                <div class="admin-table" id="adminUsers"></div>
            </section>

            <section class="admin-section reveal">
                <div class="section-heading">
                    <h3>Pets</h3>
                </div>
                <div class="admin-table" id="adminPets"></div>
            </section>

            <section class="admin-section reveal">
                <div class="section-heading">
                    <h3>Sitting requests</h3>
                </div>
                <div class="admin-table" id="adminRequests"></div>
            </section>
        </section>
    </main>

    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>
    <script src="admin.js" defer></script>
</body>
</html>
