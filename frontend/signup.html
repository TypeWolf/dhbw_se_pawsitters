<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — Pawsitters</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="site-header" class="site-header"></header>

    <main>
        <div class="auth-wrap">
            <div class="card">
                <h1 data-i18n="createAccount">Create your account</h1>
                <p class="sub" data-i18n="createAccountSub">Join Pawsitters in less than a minute.</p>

                <div id="alert"></div>

                <form id="signupForm" class="stack">
                    <div class="field">
                        <label data-i18n="firstName">First name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="field">
                        <label data-i18n="lastName">Last name</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="field">
                        <label data-i18n="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="field">
                        <label data-i18n="phoneNumber">Phone number (optional)</label>
                        <input type="tel" id="phoneNumber">
                    </div>
                    <div class="field">
                        <label data-i18n="password">Password</label>
                        <input type="password" id="password" minlength="12" required>
                        <div id="passwordRequirements" class="password-reqs">
                            <p class="req-title" data-i18n="pwdReqTitle">Password must contain:</p>
                            <ul>
                                <li id="reqLength" data-i18n="pwdReqLength">At least 12 characters</li>
                                <li id="reqUpper" data-i18n="pwdReqUpper">At least one uppercase letter</li>
                                <li id="reqLower" data-i18n="pwdReqLower">At least one lowercase letter</li>
                                <li id="reqNumber" data-i18n="pwdReqNumber">At least one number</li>
                                <li id="reqSpecial" data-i18n="pwdReqSpecial">At least one special character (!@#$%^&*)</li>
                            </ul>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-block" data-i18n="register">Create account</button>
                </form>

                <p class="auth-foot">
                    <span data-i18n="haveAccount">Already have an account?</span>
                    <a href="login.html" data-i18n="loginLink">Log in</a>
                </p>
            </div>
        </div>
    </main>

    <footer id="site-footer" class="site-footer"></footer>

    <script src="js/i18n.js"></script>
    <script src="js/session.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        Layout.init('signup');
        if (Session.isLoggedIn()) window.location.href = 'dashboard.html';

        const alertBox = document.getElementById('alert');
        const passwordInput = document.getElementById('password');
        
        const reqs = {
            length: { el: document.getElementById('reqLength'), check: (v) => v.length >= 12 },
            upper: { el: document.getElementById('reqUpper'), check: (v) => /[A-Z]/.test(v) },
            lower: { el: document.getElementById('reqLower'), check: (v) => /[a-z]/.test(v) },
            number: { el: document.getElementById('reqNumber'), check: (v) => /[0-9]/.test(v) },
            special: { el: document.getElementById('reqSpecial'), check: (v) => /[!@#$%^&*]/.test(v) }
        };

        const validatePassword = (val) => {
            let allValid = true;
            for (const key in reqs) {
                const isValid = reqs[key].check(val);
                reqs[key].el.className = isValid ? 'valid' : 'invalid';
                if (!isValid) allValid = false;
            }
            return allValid;
        };

        passwordInput.addEventListener('input', (e) => validatePassword(e.target.value));

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.innerHTML = '';
            
            if (!validatePassword(passwordInput.value)) {
                alert(I18n.t('pwdInsecure'));
                return;
            }

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value || null,
                password: document.getElementById('password').value
            };
            try {
                await Api.auth.register(payload);
                const user = await Api.auth.login(payload.email, payload.password);
                Session.user = user;
                window.location.href = 'dashboard.html';
            } catch (err) {
                alertBox.innerHTML = `<div class="alert alert-error">${I18n.t('regFailed')}${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
