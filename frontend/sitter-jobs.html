<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitter jobs — Pawsitters</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .job-card { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .job-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .job-head h3 { margin: 0; font-size: 1.2rem; }
        .job-head .pet-meta {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--ink-mute);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 2px;
        }
        .job-time { color: var(--ink-soft); font-size: 0.92rem; }
        .job-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: var(--ink-soft); }
        .job-row strong {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--ink-mute);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }
        .job-loc { color: var(--ink-soft); font-size: 0.88rem; display: flex; align-items: center; gap: 6px; }
        .job-loc .icon { color: var(--ink-mute); }
        .job-notes { font-style: italic; color: var(--ink-mute); font-size: 0.88rem; padding-left: 12px; border-left: 2px solid var(--border-strong); }
        .job-foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px; }
        .price-tag { font-family: var(--font-serif); font-weight: 600; font-size: 1.5rem; color: var(--ink); letter-spacing: -0.02em; }
        .price-tag .ccy { font-size: 0.9rem; color: var(--ink-mute); font-weight: 500; }

        .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-row .pill {
            cursor: pointer;
            background: var(--card);
            color: var(--ink-soft);
            border-color: var(--border-strong);
        }
        .filter-row .pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
        .filter-row .pill[aria-disabled="true"] { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <header id="site-header" class="site-header"></header>

    <main class="page container">
        <div class="page-header">
            <div>
                <div class="crumb">Marketplace</div>
                <h1 data-i18n="jobsTitle">Open sitter jobs</h1>
                <p data-i18n="jobsSub">Browse pet-owners looking for a sitter near you.</p>
            </div>
            <a class="btn btn-soft" href="calendar.html">
                <svg class="icon"><use href="#i-cal"></use></svg>
                <span data-i18n="goToCalendar">My calendar</span>
            </a>
        </div>

        <div class="filter-row">
            <span class="pill active" data-filter="all">All</span>
            <span class="pill" data-filter="today">Today</span>
            <span class="pill" data-filter="week">This week</span>
            <span class="pill" aria-disabled="true">By distance</span>
        </div>

        <div id="alert"></div>
        <div id="container"></div>
    </main>

    <div id="toast" class="toast"></div>
    <footer id="site-footer" class="site-footer"></footer>

    <script src="js/i18n.js"></script>
    <script src="js/session.js"></script>
    <script src="js/api.js"></script>
    <script src="js/species.js"></script>
    <script src="js/layout.js"></script>
    <script>
        if (Session.requireAuth('SITTER')) {
            Layout.init('jobs');

            const container = document.getElementById('container');
            const alertBox = document.getElementById('alert');
            const toast = document.getElementById('toast');
            let allJobs = [];
            let currentFilter = 'all';

            const HANDOVER_LABEL = {
                SITTER_HOME: 'handoverSitterHome',
                MEET_AT_PLACE: 'handoverMeet',
                OWNER_HOME_PICKUP: 'handoverPickup'
            };

            function escapeHtml(s) {
                return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[c]));
            }
            function initials(first, last) {
                return ((first || '?').charAt(0) + (last || '').charAt(0)).toUpperCase();
            }
            function petTraitPills(pet) {
                if (!pet) return '';
                const pills = [];
                if (pet.vaccinated)        pills.push({ key: 'traitVaccinated',     tone: 'sage'  });
                if (pet.houseTrained)      pills.push({ key: 'traitHouseTrained',   tone: 'sage'  });
                if (pet.canGoOutside)      pills.push({ key: 'traitCanGoOutside',   tone: 'peach' });
                if (pet.aggressive)        pills.push({ key: 'traitAggressive',     tone: 'danger'});
                return pills.map(p => `<span class="pill pill-${p.tone}" style="font-size:0.72rem;padding:3px 9px;">${I18n.t(p.key)}</span>`).join('');
            }
            function formatRange(start, end) {
                const s = new Date(start);
                const e = new Date(end);
                const sameDay = s.toDateString() === e.toDateString();
                const dateOpts = { weekday: 'short', day: '2-digit', month: 'short' };
                const timeOpts = { hour: '2-digit', minute: '2-digit' };
                if (sameDay) {
                    return `${s.toLocaleDateString(undefined, dateOpts)}, ${s.toLocaleTimeString(undefined, timeOpts)} – ${e.toLocaleTimeString(undefined, timeOpts)}`;
                }
                return `${s.toLocaleDateString(undefined, dateOpts)} ${s.toLocaleTimeString(undefined, timeOpts)} – ${e.toLocaleDateString(undefined, dateOpts)} ${e.toLocaleTimeString(undefined, timeOpts)}`;
            }
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2400);
            }
            function applyFilter(jobs) {
                if (currentFilter === 'all') return jobs;
                const now = new Date();
                if (currentFilter === 'today') {
                    return jobs.filter(j => new Date(j.startTime).toDateString() === now.toDateString());
                }
                if (currentFilter === 'week') {
                    const weekFromNow = new Date(now);
                    weekFromNow.setDate(weekFromNow.getDate() + 7);
                    return jobs.filter(j => {
                        const t = new Date(j.startTime);
                        return t >= now && t <= weekFromNow;
                    });
                }
                return jobs;
            }

            async function load() {
                container.innerHTML = `<div class="empty"><span class="empty-icon"><svg class="icon"><use href="#i-clock"></use></svg></span><p>${I18n.t('loading')}</p></div>`;
                try {
                    const jobs = await Api.requests.listOpen();
                    const me = Session.user.id;
                    // Sitter can't accept their own request — defense in depth (backend also rejects).
                    allJobs = jobs.filter(j => j.requester && j.requester.id !== me);
                    render(applyFilter(allJobs));
                } catch (err) {
                    container.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
                }
            }

            function render(jobs) {
                if (jobs.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <span class="empty-icon"><svg class="icon"><use href="#i-search"></use></svg></span>
                            <h3>${I18n.t('noJobs')}</h3>
                            <p>${I18n.t('noJobsSub')}</p>
                        </div>`;
                    return;
                }

                container.innerHTML = `<div class="job-grid">${jobs.map(j => {
                    const handover = j.handoverType ? I18n.t(HANDOVER_LABEL[j.handoverType]) : '—';
                    const priceVal = j.priceOffered != null ? Number(j.priceOffered).toFixed(2) : null;
                    const owner = j.requester ? `${escapeHtml(j.requester.firstName)} ${escapeHtml(j.requester.lastName)}` : '—';
                    const ownerInitials = j.requester ? initials(j.requester.firstName, j.requester.lastName) : '?';
                    return `
                        <div class="card card-hover job-card">
                            <div class="job-head">
                                <div style="display:flex; gap:12px; align-items:center;">
                                    ${renderSpeciesTile(j.pet && j.pet.species, 'md')}
                                    <div>
                                        <h3>${escapeHtml(j.pet ? j.pet.name : 'Pet')}</h3>
                                        <div class="pet-meta">${escapeHtml(j.pet ? j.pet.species : '')}</div>
                                    </div>
                                </div>
                            </div>
                            ${petTraitPills(j.pet) ? `<div style="display:flex;gap:4px;flex-wrap:wrap;">${petTraitPills(j.pet)}</div>` : ''}
                            <div class="job-time">${formatRange(j.startTime, j.endTime)}</div>
                            <div class="trust-strip" style="background: var(--surface);">
                                <span class="trust-item"><svg class="icon"><use href="#i-check"></use></svg> Verified</span>
                                <span class="dot"></span>
                                <span class="trust-item"><svg class="icon"><use href="#i-shield"></use></svg> Insured</span>
                            </div>
                            <div class="job-row">
                                <div>
                                    <strong>${I18n.t('owner')}</strong>
                                    <span style="display:inline-flex; align-items:center; gap:6px;">
                                        <span class="avatar avatar-sm">${ownerInitials}</span>${owner}
                                    </span>
                                </div>
                                <div>
                                    <strong>${I18n.t('handover')}</strong>
                                    ${handover}
                                </div>
                            </div>
                            ${j.handoverLocation ? `<div class="job-loc"><svg class="icon"><use href="#i-pin"></use></svg> ${escapeHtml(j.handoverLocation)}</div>` : ''}
                            ${j.handoverNotes ? `<div class="job-notes">"${escapeHtml(j.handoverNotes)}"</div>` : ''}
                            <div class="job-foot">
                                <span class="price-tag">${priceVal ? '€' + priceVal : '—'}</span>
                                <button class="btn btn-sage btn-sm" data-accept="${j.id}">
                                    <span>${I18n.t('acceptJob')}</span>
                                    <svg class="icon"><use href="#i-arrow-r"></use></svg>
                                </button>
                            </div>
                        </div>`;
                }).join('')}</div>`;

                container.querySelectorAll('[data-accept]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        btn.disabled = true;
                        try {
                            await Api.requests.accept(btn.dataset.accept, Session.user.id);
                            showToast(I18n.t('jobAcceptedToast'));
                            load();
                        } catch (err) {
                            btn.disabled = false;
                            alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
                        }
                    });
                });
            }

            document.querySelectorAll('.filter-row .pill').forEach(p => {
                if (p.getAttribute('aria-disabled') === 'true') return;
                p.addEventListener('click', () => {
                    document.querySelectorAll('.filter-row .pill').forEach(o => o.classList.remove('active'));
                    p.classList.add('active');
                    currentFilter = p.dataset.filter;
                    render(applyFilter(allJobs));
                });
            });

            document.addEventListener('paws:lang', () => { I18n.apply(); load(); });
            load();
        }
    </script>
</body>
</html>
