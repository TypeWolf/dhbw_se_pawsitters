name: Pawsitters CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup Environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
        cache-dependency-path: e2e-tests/package-lock.json

    # 2. Build Backend
    - name: Build Backend with Maven
      run: mvn clean package -DskipTests
      working-directory: ./backend

    # 3. Run Backend Tests
    - name: Run Backend Tests
      run: mvn test
      working-directory: ./backend

    # 4. Install E2E Dependencies
    - name: Install E2E Dependencies
      run: npm ci
      working-directory: ./e2e-tests

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: ./e2e-tests

    # 5. Start Backend and Frontend for E2E
    - name: Start Backend in Background
      run: java -jar target/*.jar &
      working-directory: ./backend
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Start Frontend Server
      run: npx serve ../frontend -l 3000 &
      working-directory: ./e2e-tests

    - name: Wait for Services to be Ready
      run: npx wait-on http://localhost:8080/api/users http://localhost:3000
      working-directory: ./e2e-tests

    # 6. Run E2E Tests
    - name: Run Playwright Tests
      run: npx playwright test
      working-directory: ./e2e-tests

    # 7. Upload Artifacts
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: e2e-tests/playwright-report/
        retention-days: 30
