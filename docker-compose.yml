services:
  postgres:
    image: postgres:16-alpine
    container_name: pawsitters-postgres
    environment:
      POSTGRES_DB: pawsitters
      POSTGRES_USER: pawsitters
      POSTGRES_PASSWORD: pawsitters_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pawsitters-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawsitters -d pawsitters"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pawsitters-postgres-data:
